<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Layout — architecture</title>
  <link rel="stylesheet" href="../themes/elven-deck.css" />
</head>
<body>
  <div class="deck">
    <section class="slide dark layout-architecture">
      <span class="eyebrow">Runtime suite fora do K8s</span>
      <h1 class="headline" style="color: var(--white);">Node, Python e Lambda contam a mesma história com bootstraps diferentes.</h1>

      <div class="diagram">
        <svg viewBox="0 0 1100 380" width="1100" height="380" aria-label="Arquitetura runtime suite">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(255,255,255,0.55)"/>
            </marker>
          </defs>

          <rect x="20" y="150" width="200" height="80" rx="10" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)"/>
          <text x="120" y="190" text-anchor="middle" fill="#fff" font-family="Inter" font-size="16" font-weight="700">node-app</text>
          <text x="120" y="210" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="IBM Plex Mono" font-size="11">NODE_OPTIONS</text>

          <rect x="280" y="60" width="200" height="80" rx="10" fill="rgba(0,191,165,.18)" stroke="rgba(0,191,165,.5)"/>
          <text x="380" y="100" text-anchor="middle" fill="#fff" font-family="Inter" font-size="16" font-weight="700">python-app</text>
          <text x="380" y="120" text-anchor="middle" fill="rgba(255,255,255,.7)" font-family="IBM Plex Mono" font-size="11">sitecustomize</text>

          <rect x="280" y="240" width="200" height="80" rx="10" fill="rgba(0,229,255,.14)" stroke="rgba(0,229,255,.5)"/>
          <text x="380" y="280" text-anchor="middle" fill="#fff" font-family="Inter" font-size="16" font-weight="700">node-lambda</text>
          <text x="380" y="300" text-anchor="middle" fill="rgba(255,255,255,.7)" font-family="IBM Plex Mono" font-size="11">EXEC_WRAPPER</text>

          <rect x="540" y="150" width="220" height="80" rx="10" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.18)"/>
          <text x="650" y="190" text-anchor="middle" fill="#fff" font-family="Inter" font-size="16" font-weight="700">otel-collector</text>
          <text x="650" y="210" text-anchor="middle" fill="rgba(255,255,255,.6)" font-family="IBM Plex Mono" font-size="11">:4318 OTLP</text>

          <rect x="820" y="150" width="220" height="80" rx="10" fill="rgba(215,255,99,.16)" stroke="rgba(215,255,99,.5)"/>
          <text x="930" y="190" text-anchor="middle" fill="#fff" font-family="Inter" font-size="16" font-weight="700">LGTM stack</text>
          <text x="930" y="210" text-anchor="middle" fill="rgba(255,255,255,.7)" font-family="IBM Plex Mono" font-size="11">Loki / Tempo / Mimir</text>

          <path d="M 220 190 L 280 100" stroke="rgba(255,255,255,.4)" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
          <path d="M 220 190 L 280 280" stroke="rgba(255,255,255,.4)" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
          <path d="M 480 100 L 540 190" stroke="rgba(255,255,255,.4)" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
          <path d="M 480 280 L 540 190" stroke="rgba(255,255,255,.4)" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
          <path d="M 760 190 L 820 190" stroke="rgba(255,255,255,.4)" fill="none" stroke-width="2" marker-end="url(#arrow)"/>
        </svg>
      </div>

      <img class="logo-block" src="../assets/elven-logo.png" alt="Elven" />
    </section>
  </div>
</body>
</html>
