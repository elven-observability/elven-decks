<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Layout — chart-full</title>
  <link rel="stylesheet" href="../themes/elven-deck.css" />
</head>
<body>
  <div class="deck">
    <section class="slide layout-chart-full">
      <span class="eyebrow">Reservas e pagamentos</span>
      <h1 class="headline">Recuperação do throughput a partir das 14h, com sobrecarga nas horas seguintes.</h1>

      <div class="chart">
        <img src="../assets/sample-chart-throughput.svg" alt="Throughput reservas + pagamentos por hora" />
      </div>

      <p class="footnote">Janela 07/05 20:00 → 08/05 20:00 BRT. Métrica composta: Beyla HTTP requests + audit logs (Loki).</p>

      <img class="logo-block" src="../assets/elven-logo.png" alt="Elven" />
    </section>
  </div>
</body>
</html>
