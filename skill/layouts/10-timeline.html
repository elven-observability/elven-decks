<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Layout — timeline</title>
  <link rel="stylesheet" href="../themes/elven-deck.css" />
</head>
<body>
  <div class="deck">
    <section class="slide layout-timeline">
      <span class="eyebrow">Linha do tempo do incidente</span>
      <h1 class="headline">Quatro marcos entre o início da pressão e a normalização parcial.</h1>

      <div class="axis">
        <div class="marker is-above is-warn" style="left: 8%;">
          <div class="dot"></div>
          <div class="text">01:00 BRT — Disco MySQL ~90%</div>
        </div>
        <div class="marker is-below is-warn" style="left: 33%;">
          <div class="dot"></div>
          <div class="text">10:00 BRT — Retry storm</div>
        </div>
        <div class="marker is-above is-bad" style="left: 62%;">
          <div class="dot"></div>
          <div class="text">13:47 BRT — Último erro fatal</div>
        </div>
        <div class="marker is-below is-resolved" style="left: 88%;">
          <div class="dot"></div>
          <div class="text">14:00 BRT — Vendas voltam</div>
        </div>
      </div>

      <img class="logo-block" src="../assets/elven-logo.png" alt="Elven" />
    </section>
  </div>
</body>
</html>
