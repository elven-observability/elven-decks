<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Deck com slide sem .kicker</title>
    <link rel="stylesheet" href="elven-deck.css" />
  </head>
  <body>
    <main class="deck">
      <section class="slide cover">
        <img class="logo" src="assets/elven-logo.png" alt="Elven" />
        <div class="content">
          <div class="kicker">Capa</div>
          <h1>Capa correta.</h1>
        </div>
      </section>
      <section class="slide">
        <img class="logo" src="assets/elven-logo.png" alt="Elven" />
        <div class="content">
          <h2>Quebra a regra L8: este slide não tem .kicker.</h2>
        </div>
      </section>
    </main>
  </body>
</html>
