<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Fixture com layout não canônico</title>
  <link rel="stylesheet" href="elven-deck.css" />
</head>
<body>
<div class="deck">
  <section class="slide cover layout-cover">
    <h1 class="headline is-large">Cover OK.</h1>
    <img class="logo-block" src="assets/elven-logo.png" alt="Elven" />
  </section>
  <section class="slide layout-superdense">
    <h1 class="headline">Layout inventado.</h1>
    <img class="logo-block" src="assets/elven-logo.png" alt="Elven" />
  </section>
  <section class="slide layout-closing">
    <span class="eyebrow">Fechamento</span>
    <h1 class="headline">Closing.</h1>
    <div class="takeaways"><div class="takeaway">Item.</div></div>
    <img class="logo-block" src="assets/elven-logo.png" alt="Elven" />
  </section>
</div>
</body>
</html>
