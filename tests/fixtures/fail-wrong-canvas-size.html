<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Deck com canvas errado</title>
    <style>
      :root {
        --w: 1920px;
        --h: 1080px;
        --teal: #00bfa5;
      }
      .slide { width: var(--w); height: var(--h); }
    </style>
  </head>
  <body>
    <main class="deck">
      <section class="slide cover">
        <img class="logo" src="assets/elven-logo.png" alt="Elven" />
        <div class="content">
          <div class="kicker">Capa</div>
          <h1>Quebra a regra L5: canvas 1920x1080, não 1280x720.</h1>
        </div>
      </section>
      <section class="slide">
        <img class="logo" src="assets/elven-logo.png" alt="Elven" />
        <div class="content">
          <div class="kicker">Seção</div>
          <h2>Tokens inline existem, mas o tamanho do canvas está fora do padrão.</h2>
        </div>
      </section>
    </main>
  </body>
</html>
