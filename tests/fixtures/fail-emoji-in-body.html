<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Deck com emoji no corpo</title>
    <link rel="stylesheet" href="elven-deck.css" />
  </head>
  <body>
    <main class="deck">
      <section class="slide cover">
        <img class="logo" src="assets/elven-logo.png" alt="Elven" />
        <div class="content">
          <div class="kicker">Capa</div>
          <h1>Quebra a regra L10: tem um emoji 🚀 no corpo visível.</h1>
        </div>
      </section>
      <section class="slide">
        <img class="logo" src="assets/elven-logo.png" alt="Elven" />
        <div class="content">
          <div class="kicker">Seção</div>
          <h2>Use a classe .tag para badges, nunca emoji.</h2>
        </div>
      </section>
    </main>
  </body>
</html>
