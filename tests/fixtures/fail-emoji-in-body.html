<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Deck com emoji no corpo</title>
  <link rel="stylesheet" href="elven-deck.css" />
</head>
<body>
<div class="deck">
  <section class="slide cover layout-cover">
    <span class="eyebrow">Cover</span>
    <h1 class="headline is-large">Slide com emoji 🚀 no corpo.</h1>
    <img class="logo-block" src="assets/elven-logo.png" alt="Elven" />
  </section>
  <section class="slide layout-closing">
    <span class="eyebrow">Fechamento</span>
    <h1 class="headline">Closing.</h1>
    <div class="takeaways"><div class="takeaway">Item ✅ válido.</div></div>
    <img class="logo-block" src="assets/elven-logo.png" alt="Elven" />
  </section>
</div>
</body>
</html>
